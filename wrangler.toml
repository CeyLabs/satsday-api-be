name                 = "satsday-api-be"
main                 = "src/index.ts"
compatibility_date   = "2024-09-23"
compatibility_flags  = ["nodejs_compat"]
account_id           = "82c5ee4b5bf756e6658c8d9807d21592"

[vars]
ENVIRONMENT  = "production"
FRONTEND_URL = "https://sats.day"

# Secrets (set via `wrangler secret put` or GitHub Actions):
#   TG_BOT_TOKEN      — @satsdaybot token
#   BTCPAY_URL        — BTCPay Server URL
#   BTCPAY_API_KEY    — BTCPay store API key
#   BTCPAY_STORE_ID   — BTCPay store ID

[[d1_databases]]
binding       = "DB"
database_name = "satsday"
database_id   = "22b17f35-6fb6-4227-93db-fc89b216635a"

[[kv_namespaces]]
binding = "KV"
id      = "cb6b1e0095604bdb9324057bc127c964"

[[queues.producers]]
binding = "TASK_QUEUE"
queue   = "satsday-tasks"

[[queues.consumers]]
queue             = "satsday-tasks"
max_batch_size    = 10
max_batch_timeout = 5
